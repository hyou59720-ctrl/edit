name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies and Amharic Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser fonts-noto-core

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Render Video
        run: npm run build -- --gl=angle --headless --no-sandbox --disable-web-security
        env:
          REMOTION_CHROME_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Upload Rendered Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: out/video.mp4

